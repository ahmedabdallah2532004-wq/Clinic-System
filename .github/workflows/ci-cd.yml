name: Clinic System CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  BACKEND_IMAGE_NAME: ghcr.io/ahmedabdallah2532004-wq/clinic-system-backend
  FRONTEND_IMAGE_NAME: ghcr.io/ahmedabdallah2532004-wq/clinic-system-frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  packages: write

jobs:
  test-backend:
    name: Backend Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: clinic_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install Dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Run Migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/clinic_db_test?schema=public
        run: npx prisma migrate deploy

      - name: Run Unit Tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/clinic_db_test?schema=public
          JWT_SECRET: supersecretjwtkey123
        run: npm run test

      - name: Run E2E Tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/clinic_db_test?schema=public
          JWT_SECRET: supersecretjwtkey123
        run: npm run test:e2e

  test-frontend:
    name: Frontend Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Lint
        working-directory: frontend
        run: npm run lint

      - name: Build Frontend (Verify Compilation)
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
        run: npm run build

  build-and-push:
    name: Build & Push Docker Images
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE_NAME }}:latest
            ${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE_NAME }}:latest
            ${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Automatic SSH Deployment
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "docker-compose.yml"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "Determining Docker command permissions..."
            if docker ps >/dev/null 2>&1; then
              DOCKER_CMD="docker"
            elif sudo docker ps >/dev/null 2>&1; then
              DOCKER_CMD="sudo docker"
            else
              echo "Error: docker command not accessible (even with sudo)."
              exit 1
            fi

            if $DOCKER_CMD compose version >/dev/null 2>&1; then
              DOCKER_COMPOSE_CMD="$DOCKER_CMD compose"
            elif $DOCKER_CMD-compose version >/dev/null 2>&1; then
              DOCKER_COMPOSE_CMD="$DOCKER_CMD-compose"
            else
              echo "Error: docker compose command not found."
              exit 1
            fi

            echo "Using Docker command: $DOCKER_CMD"
            echo "Using Docker Compose command: $DOCKER_COMPOSE_CMD"

            echo "Logging into GitHub Container Registry..."
            echo "${{ secrets.GITHUB_TOKEN }}" | $DOCKER_CMD login ghcr.io -u ${{ github.actor }} --password-stdin
            
            echo "Navigating to deployment directory..."
            mkdir -p ${{ secrets.DEPLOY_PATH }}
            cd ${{ secrets.DEPLOY_PATH }}
            
            echo "Pulling latest Docker images..."
            $DOCKER_COMPOSE_CMD pull
            
            echo "Restarting service containers..."
            $DOCKER_COMPOSE_CMD up -d
            
            echo "Pruning unused images to save disk space..."
            $DOCKER_CMD image prune -f
